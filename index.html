<style>
  html, body { background: #09090b; color: #fafafa; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
    margin: 0; padding: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior-y: contain;
  }
  /* Respect iPhone safe areas in standalone PWA */
  @supports (padding: env(safe-area-inset-top)) {
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
  }
  #root { min-height: 100vh; min-height: 100dvh; }
  .boot-loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #09090b;
    color: #71717a;
    font-size: 14px;
  }
  .boot-loader.hidden { display: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #09090b; }
  ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #52525b; }
  ul { list-style: none; padding: 0; margin: 0; }
  noscript { color: #fafafa; padding: 2rem; display: block; max-width: 600px; margin: 4rem auto; }
  @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .pulse-soft { animation: pulse-soft 1.4s ease-in-out infinite; }
  /* Disable iOS tap highlight + touch callout for buttons */
  button, a { -webkit-tap-highlight-color: transparent; }
  button { -webkit-touch-callout: none; }
</style>
</head>
<body>

<div id="root">
  <div class="boot-loader" id="bootLoader">
    <div style="text-align:center;" class="pulse-soft">
      <div style="font-weight:600; color:#fafafa; margin-bottom:6px; font-size:15px;">Lords of the Fallen</div>
      <div>Loading checklist…</div>
    </div>
  </div>
</div>

<noscript>
  <h1>JavaScript required</h1>
  <p>This checklist is a single-page React app. Please enable JavaScript in your browser to use it.</p>
</noscript>

  e.respondWith(
    caches.open(CACHE).then((cache) =>
